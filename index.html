<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в Москве</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        /* Loading animation styles */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4">

    <div class="weather-card rounded-3xl p-8 max-w-md w-full text-center relative overflow-hidden">
        
        <!-- Background decorative elements -->
        <div class="absolute -top-20 -left-20 w-40 h-40 bg-white rounded-full mix-blend-overlay filter blur-2xl opacity-20"></div>
        <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-white rounded-full mix-blend-overlay filter blur-2xl opacity-20"></div>

        <h1 class="text-3xl font-bold mb-2 tracking-wide relative z-10">Москва</h1>
        <p class="text-sm text-indigo-100 mb-8 relative z-10" id="current-date">Загрузка даты...</p>

        <!-- Loading State -->
        <div id="loading" class="py-10 relative z-10">
            <div class="spinner"></div>
            <p class="mt-4 text-indigo-100">Получение данных о погоде...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden py-10 relative z-10">
            <svg class="w-12 h-12 text-red-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p class="text-red-200">Не удалось загрузить данные о погоде.</p>
            <button onclick="fetchWeather()" class="mt-4 px-4 py-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-lg transition-colors text-sm">Попробовать снова</button>
        </div>

        <!-- Weather Data Content (Hidden initially) -->
        <div id="weather-content" class="hidden fade-in relative z-10">
            
            <div class="flex justify-center items-center mb-6">
                <!-- Weather Icon placeholder -->
                <div id="weather-icon" class="text-6xl mr-4">⛅</div>
                <div>
                    <div class="text-6xl font-bold tracking-tighter" id="temperature">--°</div>
                    <div class="text-xl font-medium text-indigo-100 mt-1" id="weather-desc">Загрузка...</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <!-- Wind -->
                <div class="bg-white bg-opacity-10 rounded-2xl p-4 flex flex-col items-center">
                    <svg class="w-6 h-6 mb-2 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                    <span class="text-xs text-indigo-200 uppercase tracking-wider mb-1">Ветер</span>
                    <span class="font-semibold text-lg" id="wind-speed">-- м/с</span>
                </div>
                
                <!-- Humidity / Feel -->
                <div class="bg-white bg-opacity-10 rounded-2xl p-4 flex flex-col items-center">
                    <svg class="w-6 h-6 mb-2 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span class="text-xs text-indigo-200 uppercase tracking-wider mb-1">Ощущается как</span>
                    <span class="font-semibold text-lg" id="apparent-temp">--°</span>
                </div>
            </div>
            
            <div class="mt-6 text-xs text-indigo-200 opacity-70 text-right">
                Данные от Open-Meteo
            </div>
        </div>
    </div>

    <script>
        // Set current date in Russian
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const currentDateStr = new Date().toLocaleDateString('ru-RU', dateOptions);
        // Capitalize first letter
        document.getElementById('current-date').textContent = currentDateStr.charAt(0).toUpperCase() + currentDateStr.slice(1);

        // UI Elements
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const contentEl = document.getElementById('weather-content');
        
        const tempEl = document.getElementById('temperature');
        const descEl = document.getElementById('weather-desc');
        const windEl = document.getElementById('wind-speed');
        const apparentTempEl = document.getElementById('apparent-temp');
        const iconEl = document.getElementById('weather-icon');

        // WMO Weather interpretation codes (https://open-meteo.com/en/docs)
        function getWeatherDescriptionAndIcon(code, isDay) {
            const wmoCodes = {
                0: { desc: 'Ясно', icon: isDay ? '☀️' : '🌙' },
                1: { desc: 'Преимущественно ясно', icon: isDay ? '🌤️' : '☁️' },
                2: { desc: 'Переменная облачность', icon: '⛅' },
                3: { desc: 'Пасмурно', icon: '☁️' },
                45: { desc: 'Туман', icon: '🌫️' },
                48: { desc: 'Изморозь', icon: '🌫️' },
                51: { desc: 'Легкая морось', icon: '🌧️' },
                53: { desc: 'Умеренная морось', icon: '🌧️' },
                55: { desc: 'Сильная морось', icon: '🌧️' },
                56: { desc: 'Легкая ледяная морось', icon: '🌧️❄️' },
                57: { desc: 'Сильная ледяная морось', icon: '🌧️❄️' },
                61: { desc: 'Небольшой дождь', icon: '🌦️' },
                63: { desc: 'Умеренный дождь', icon: '🌧️' },
                65: { desc: 'Сильный дождь', icon: '🌧️' },
                66: { desc: 'Легкий ледяной дождь', icon: '🌧️❄️' },
                67: { desc: 'Сильный ледяной дождь', icon: '🌧️❄️' },
                71: { desc: 'Небольшой снег', icon: '🌨️' },
                73: { desc: 'Умеренный снег', icon: '❄️' },
                75: { desc: 'Сильный снег', icon: '❄️' },
                77: { desc: 'Снежные зерна', icon: '❄️' },
                80: { desc: 'Слабые ливни', icon: '🌦️' },
                81: { desc: 'Умеренные ливни', icon: '🌧️' },
                82: { desc: 'Сильные ливни', icon: '⛈️' },
                85: { desc: 'Небольшой снегопад', icon: '🌨️' },
                86: { desc: 'Сильный снегопад', icon: '❄️' },
                95: { desc: 'Гроза', icon: '🌩️' },
                96: { desc: 'Гроза с мелким градом', icon: '⛈️' },
                99: { desc: 'Гроза с крупным градом', icon: '⛈️' }
            };

            return wmoCodes[code] || { desc: 'Неизвестно', icon: '🌡️' };
        }

        async function fetchWeather() {
            // Hide error/content, show loading
            errorEl.classList.add('hidden');
            contentEl.classList.add('hidden');
            loadingEl.classList.remove('hidden');

            // Coordinates for Moscow
            const lat = 55.7558;
            const lon = 37.6173;
            
            try {
                // Fetch current weather data from Open-Meteo
                // We request temperature, weather code (for icon/desc), wind speed, apparent temp, and is_day
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,is_day,weather_code,wind_speed_10m&wind_speed_unit=ms&timezone=Europe%2FMoscow`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const current = data.current;

                // Update UI with data
                tempEl.textContent = `${Math.round(current.temperature_2m)}°`;
                apparentTempEl.textContent = `${Math.round(current.apparent_temperature)}°`;
                
                // Open-meteo returns wind speed in requested unit (m/s)
                windEl.textContent = `${current.wind_speed_10m.toFixed(1)} м/с`;

                // Get description and icon based on weather code and day/night
                const weatherInfo = getWeatherDescriptionAndIcon(current.weather_code, current.is_day);
                descEl.textContent = weatherInfo.desc;
                iconEl.textContent = weatherInfo.icon;

                // Show content, hide loading
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');

            } catch (error) {
                console.error("Failed to fetch weather:", error);
                // Show error, hide loading
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // Initialize fetch on load
        fetchWeather();
    </script>
</body>
</html>
